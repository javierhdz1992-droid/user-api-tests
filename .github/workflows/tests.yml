name: Playwright API Tests with Allure

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy: 
      fail-fast: false 
      matrix: 
        environment: 
          - dev 
          - prod

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start API with Docker
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Verify Container
        run: docker ps

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/dev/users; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 3
          done
          echo "API failed to start"
          exit 1

      - name: Configure Environment Variables
        run: |
          echo "TEST_ENV=${{ matrix.environment }}" >> $GITHUB_ENV
          echo "BASE_URL=http://localhost:3000/${{ matrix.environment }}" >> $GITHUB_ENV
          echo "AUTH_TOKEN=${{ secrets.AUTH_TOKEN }}" >> $GITHUB_ENV

      - name: Display Environment
        run: |
          echo "Running tests against:"
          echo "$BASE_URL"

      - name: Execute Playwright Tests
        run: npx playwright test

      - name: Verify Allure Results
        if: always()
        run: |
          ls -la
          ls -la allure-results || mkdir -p allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.environment }}
          path: allure-results

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.environment }}
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: always() && matrix.environment == 'dev'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report