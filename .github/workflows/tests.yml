name: Run Tests with Allure

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write   # necesario para crear gh-pages

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci   # 🔥 mejor que npm install en CI

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

      - name: Debug allure results
        if: always()
        run: |
          echo "Checking files..."
          ls -la
          ls -la allure-results || echo "No allure-results"

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report || echo "Allure generation failed"

      - name: Debug allure report
        if: always()
        run: |
          ls -la allure-report || echo "No allure-report"

      - name: Upload Allure Report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 🚀 DEPLOY A GITHUB PAGES (SOLO EN MAIN)
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report