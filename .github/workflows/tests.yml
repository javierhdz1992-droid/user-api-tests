name: Run Tests with Allure

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start API with Docker
        run: |
          docker run -d -p 3000:3000 ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

      - name: Wait for API
        run: |
          for i in {1..15}; do
            curl -f http://localhost:3000/dev/users && break
            echo "Waiting for API..."
            sleep 3
          done

      - name: Set BASE_URL
        run: echo "BASE_URL=http://localhost:3000" >> $GITHUB_ENV

      - name: Run tests
        run: npx playwright test

      - name: Debug allure results
        if: always()
        run: |
          echo "Checking files..."
          ls -la
          ls -la allure-results || echo "No allure-results"

      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate allure-results --clean -o allure-report || echo "Allure generation failed"

      - name: Debug allure report
        if: always()
        run: |
          ls -la allure-report || echo "No allure-report"

      - name: Upload Allure Report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report